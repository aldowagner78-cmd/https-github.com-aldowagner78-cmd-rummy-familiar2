<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="feltGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1E6C45" />
      <stop offset="70%" stop-color="#145334" />
      <stop offset="100%" stop-color="#0F3E26" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="50%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>
    <linearGradient id="ivoryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FDFBF0" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background felt table -->
  <rect width="512" height="512" rx="112" fill="url(#feltGrad)" />
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#2C7E57" stroke-width="6" opacity="0.6" />
  <rect x="28" y="28" width="456" height="456" rx="84" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4" />

  <!-- Stacked Ivory Tiles -->
  <g filter="url(#shadow)" transform="translate(48, 50)">
    <!-- Tile 1: Blue 7 -->
    <g transform="rotate(-12, 120, 240)">
      <rect x="80" y="140" width="100" height="150" rx="14" fill="url(#ivoryGrad)" stroke="#E9E5CE" stroke-width="2" />
      <rect x="88" y="148" width="84" height="134" rx="8" fill="none" stroke="#212121" stroke-width="1" opacity="0.1" />
      <text x="130" y="235" font-family="system-ui, sans-serif" font-size="76" font-weight="900" fill="#1976D2" text-anchor="middle">7</text>
    </g>

    <!-- Tile 2: Red Joker (Center Highlighted) -->
    <g transform="translate(120, 90)">
      <rect x="80" y="140" width="110" height="165" rx="16" fill="#FFFFFF" stroke="#E9E5CE" stroke-width="3" />
      <rect x="88" y="148" width="94" height="149" rx="10" fill="none" stroke="#D32F2F" stroke-width="1" opacity="0.2" />
      <!-- Star / Joker Symbol -->
      <path d="M135,175 L142,195 L163,195 L146,208 L152,228 L135,216 L118,228 L124,208 L107,195 L128,195 Z" fill="url(#goldGrad)" />
      <text x="135" y="280" font-family="system-ui, sans-serif" font-size="34" font-weight="900" fill="#6A1B9A" text-anchor="middle" letter-spacing="1">JOKER</text>
    </g>

    <!-- Tile 3: Orange 9 -->
    <g transform="rotate(10, 240, 240)">
      <rect x="220" y="140" width="100" height="150" rx="14" fill="url(#ivoryGrad)" stroke="#E9E5CE" stroke-width="2" />
      <rect x="228" y="148" width="84" height="134" rx="8" fill="none" stroke="#212121" stroke-width="1" opacity="0.1" />
      <text x="270" y="235" font-family="system-ui, sans-serif" font-size="76" font-weight="900" fill="#E65100" text-anchor="middle">9</text>
    </g>
  </g>

  <!-- Crown of Success -->
  <path d="M226,70 L241,50 L256,70 L271,50 L286,70 L280,85 L232,85 Z" fill="url(#goldGrad)" filter="url(#shadow)" />

  <!-- Modern Tabletop Frame Text -->
  <g transform="translate(256, 450)" filter="url(#shadow)">
    <text font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="900" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="4">BURAKO &amp; RUMMY</text>
    <text y="24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#A2D7BC" text-anchor="middle" letter-spacing="6">FAMILY CLUB</text>
  </g>
</svg>
